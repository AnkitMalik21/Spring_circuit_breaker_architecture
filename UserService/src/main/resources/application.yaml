server:
  port: 8081

spring:
  application:
    name: UserService
  datasource:
    url: jdbc:postgresql://localhost:5432/user
    username: postgres
    password: Malik@1
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

    database-platform: org.hibernate.dialect.PostgreSQLDialect

  config:
    import: "optional:configserver:http://localhost:8085"

# 'optional:' means the app won't crash if it can't reach the config server immediately
# 'configserver:' is a required, built-in keyword that tells Spring Boot talking to a Spring Cloud Config Server


